<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TARX — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0D;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #F04438; display: inline-block; margin-right: 6px; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    p { font-size: 14px; color: #667085; text-align: center; max-width: 380px; line-height: 1.6; }
    .actions { display: flex; gap: 12px; margin-top: 8px; -webkit-app-region: no-drag; }
    button, a.btn {
      -webkit-app-region: no-drag;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #111318;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    button:hover, a.btn:hover { background: #1A1D24; }
    a.primary { background: #92B6DE; color: #0A0A0D; border: none; font-weight: 600; }
    a.primary:hover { opacity: 0.9; }
    .hint { font-size: 12px; color: #444; margin-top: 16px; font-family: 'SF Mono', monospace; }
  </style>
</head>
<body>
  <h1><span class="dot"></span>Offline</h1>
  <p>TARX couldn't reach tarx.com or your local Bridge. Install the local runtime to use TARX without internet.</p>
  <div class="actions">
    <button onclick="window.__TARX_DESKTOP__?.getStatus?.().then(() => location.reload()) || location.reload()">Retry</button>
    <a class="btn primary" href="https://tarx.com/install" target="_blank">Install Local Runtime</a>
  </div>
  <p class="hint">curl -fsSL tarx.com/install | sh</p>
</body>
</html>
