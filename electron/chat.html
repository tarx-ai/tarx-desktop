<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TARX Computer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #111318;
      --line: rgba(255,255,255,0.12);
      --text: #f2ede6;
      --muted: #9aa3b2;
      --accent: #40B6FB;
      --ok: #3dd68c;
      --bad: #f04438;
      --warn: #fea121;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    body { display: grid; grid-template-rows: auto 1fr auto; min-height: 100%; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,19,24,0.92);
      -webkit-app-region: drag;
    }
    header .brand { font-weight: 650; letter-spacing: 0.02em; }
    header .meta { color: var(--muted); font-size: 12px; -webkit-app-region: no-drag; }
    #status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
    #status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--warn);
    }
    #status.ok .dot { background: var(--ok); }
    #status.bad .dot { background: var(--bad); }
    main {
      overflow: auto;
      padding: 20px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: min(780px, 100%);
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { align-self: flex-end; background: #15202b; border-color: rgba(64,182,251,0.35); }
    .msg.assistant { align-self: flex-start; }
    .msg.system { align-self: center; color: var(--muted); background: transparent; border-style: dashed; font-size: 12px; }
    .msg .who { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
    footer {
      border-top: 1px solid var(--line);
      padding: 12px 18px 16px;
      background: rgba(17,19,24,0.96);
    }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      max-width: 920px;
      margin: 0 auto;
    }
    textarea {
      width: 100%;
      min-height: 52px;
      max-height: 160px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b0d12;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }
    textarea:focus { border-color: rgba(64,182,251,0.55); }
    button {
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #050505;
      font-weight: 650;
      padding: 0 18px;
      cursor: pointer;
      min-width: 96px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { max-width: 920px; margin: 8px auto 0; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="brand">TARX Computer</div>
      <div class="meta" id="buildMeta">private beta · local runtime</div>
    </div>
    <div id="status" class="warn" title="Local Bridge health">
      <span class="dot"></span>
      <span id="statusText">Checking local runtime…</span>
    </div>
  </header>

  <main id="thread" aria-live="polite"></main>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="Ask TARX anything…" rows="2" autofocus></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <div class="hint">Packaged local shell · inference via local Bridge (127.0.0.1:11440) · not a Vercel page</div>
  </footer>

  <script>
    const BRIDGE = 'http://127.0.0.1:11440';
    const thread = document.getElementById('thread');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const buildMeta = document.getElementById('buildMeta');

    const messages = [];

    function addMessage(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      if (role !== 'system') {
        const who = document.createElement('span');
        who.className = 'who';
        who.textContent = role === 'user' ? 'You' : 'TARX';
        el.appendChild(who);
      }
      el.appendChild(document.createTextNode(text));
      thread.appendChild(el);
      thread.scrollTop = thread.scrollHeight;
      return el;
    }

    function setStatus(kind, text) {
      statusEl.className = kind;
      statusText.textContent = text;
    }

    async function refreshHealth() {
      try {
        const res = await fetch(BRIDGE + '/health', { method: 'GET' });
        if (!res.ok) throw new Error('health ' + res.status);
        const data = await res.json();
        setStatus('ok', 'Local runtime · Bridge ' + (data.version || 'ok'));
        return true;
      } catch (err) {
        setStatus('bad', 'Local runtime offline · start Bridge');
        return false;
      }
    }

    async function send() {
      const text = (input.value || '').trim();
      if (!text || sendBtn.disabled) return;
      input.value = '';
      addMessage('user', text);
      messages.push({ role: 'user', content: text });
      sendBtn.disabled = true;
      const pending = addMessage('assistant', 'Thinking locally…');
      try {
        const ok = await refreshHealth();
        if (!ok) {
          pending.lastChild.textContent = 'Local Bridge is offline. Start the TARX local runtime, then retry.';
          return;
        }
        const res = await fetch(BRIDGE + '/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'tarx',
            messages: messages.slice(-12),
            stream: false,
            max_tokens: 512,
          }),
        });
        if (!res.ok) {
          const body = await res.text();
          throw new Error('chat ' + res.status + ': ' + body.slice(0, 200));
        }
        const data = await res.json();
        const answer =
          data?.choices?.[0]?.message?.content ||
          data?.message?.content ||
          data?.content ||
          JSON.stringify(data).slice(0, 400);
        pending.lastChild.textContent = String(answer);
        messages.push({ role: 'assistant', content: String(answer) });
      } catch (err) {
        pending.lastChild.textContent = 'Local chat failed: ' + (err && err.message ? err.message : String(err));
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Optional identity from query injected by main
    try {
      const q = new URLSearchParams(location.search);
      const ver = q.get('v');
      const ch = q.get('channel') || 'private beta';
      if (ver) buildMeta.textContent = ch + ' · v' + ver + ' · local runtime';
    } catch {}

    addMessage('system', 'TARX Computer local shell. Your work stays on this Mac when Bridge is running.');
    refreshHealth();
    setInterval(refreshHealth, 15000);
  </script>
</body>
</html>
